<!DOCTYPE html>
<!-- Tag html ini adalah bungkus utama web kita. 'id' berarti bahasa webnya Indonesia -->
<html lang="id">
<head>
    <!-- Meta charset mengatur agar web bisa membaca karakter khusus seperti emoji -->
    <meta charset="UTF-8">
    <!-- Meta viewport ini SANGAT PENTING agar web kita responsif saat dibuka di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Title adalah teks yang muncul di tab atas browser (Google Chrome, dll) -->
    <title>ydsnisnt | Personal Web</title>
    
    <!-- Nah, baris inilah yang menghubungkan file HTML dengan file CSS kita -->
    <link rel="stylesheet" href="style.css">
</head>

<!-- Body adalah bagian web yang terlihat oleh pengunjung. Kita beri tema awal 'theme-maroon' -->
<body class="theme-maroon">
    <!-- Header untuk menampung saklar di pojok kanan atas-->
    <header class="main-header">
        <div class="toggle-container0=">
            <span id="mode-text">Profesional Mode</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider"></span>
            </label>

        </div>

    </header>

    <!-- Tag main ini digunakan untuk membungkus konten utama halaman web -->
    <main class="container">
        
        <h1 id="nama-profil">Welcome bhuwackzzzz....</h1>

    </main>

    <!-- Baris ini menghubungkan file HTML dengan file JavaScript kita -->
    <!-- Ingat, script biasanya ditaruh di paling bawah body agar HTML dimuat duluan -->
    <script src="script.js"></script>
</body>
</html>
