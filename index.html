<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ydsisnt | Personal Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<!--
  class "theme-maroon" di sini cuma NILAI AWAL (default) pas web pertama dibuka.
  Nanti begitu script.js jalan, dia bakal ngecek localStorage: kalau kamu
  terakhir kali milih Fun Mode, class ini otomatis diganti ke "theme-blue"
  SEBELUM kamu sempat lihat mode maroon-nya kedip sekilas.
-->
<body class="theme-maroon">

    <!--
      LAPISAN DEKORASI BACKGROUND (blur + salju).
      Ditaruh paling atas di dalam <body> supaya secara urutan DOM dia
      "di bawah" konten lain, tapi z-index-nya sudah diatur lewat CSS
      (lihat style.css bagian 15 & 16) supaya tetap ada DI ATAS gradient
      background namun DI BAWAH header/hero/footer.
    -->
    <div id="bg-blur-overlay" class="bg-blur-overlay"></div>
    <div id="snow-container" class="snow-container"></div>

    <!-- HEADER UTAMA -->
    <header class="main-header">
        <!-- Brand / Logo Kiri Atas -->
        <div class="logo">YDSNISNT</div>

        <!-- Bagian Kanan Header: Sosmed & Saklar -->
        <div class="header-right">
            <!-- Tombol Sosmed (Hanya Muncul di Fun Mode, diatur lewat CSS: body.theme-blue .btn-sosmed) -->
            <div class="nav-left">
                <button id="btn-sosmed" class="btn-sosmed" type="button" aria-expanded="false">Sosmed 📱</button>

                <div id="sosmed-menu" class="sosmed-menu hidden">
                    <!-- TEMPEL LINK SOSMED DI SINI -->
                    <a href="https://instagram.com/ydsisnt_" target="_blank" rel="noopener" class="sosmed-item">Instagram</a>
                    <a href="https://www.facebook.com/share/1DQ97p2Qo3/" target="_blank" rel="noopener" class="sosmed-item">Facebook</a>
                    <a href="https://www.youtube.com/@yudasisnandar7334" target="_blank" rel="noopener" class="sosmed-item">YouTube</a>
                    <!-- FYI: href Pinterest kamu sebelumnya kepanjangan teks "Check out my Pinterest profile!..."
                         itu bukan URL valid, jadi link-nya bakal rusak. Aku betulkan jadi URL murni di bawah. -->
                    <a href="https://pin.it/1u1EvgTv3" target="_blank" rel="noopener" class="sosmed-item">Pinterest</a>
                </div>
            </div>

            <!-- Saklar Mode -->
            <div class="toggle-container">
                <span id="mode-text">Profesional Mode 💼</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <!-- KONTEN UTAMA (HERO SECTION DESAIN MINIMALIS) -->
    <main class="hero-container tilt-card">
        <!--
          class "tilt-card" ditambahin di sini supaya seluruh blok hero
          (judul + subjudul) ikut miring 3D ngikutin posisi mouse.
          Logikanya ada di script.js -> fungsi initTiltEffect().
        -->

        <!--
          FIX: dulu elemen-elemen ini belum ada padahal script.js & style.css
          udah nyiapin logikanya (heroSubtitle, .sub-title-top, .sub-title-bottom).
          Sekarang aku tambahin, jadi ada 2 baris teks kecil: satu DI ATAS judul,
          satu DI BAWAH judul, keduanya ikut berubah pas mode di-toggle.
        -->
        <p id="subtitle-top" class="sub-title-top">Welcome To My World</p>

        <h1 id="hero-title" class="main-title">Hallo Im ydsisnt</h1>

        <p id="subtitle-bottom" class="sub-title-bottom">Informatics Engineering Student</p>

        <div class="fun-btn-wrapper">
            <a href="funfact.html" id="btn-funfact" class="btn-funfact">Fun Fact About Me</a>
        </div>

        <!--
          WIDGET "NOW PLAYING" -- EMBED SPOTIFY MINI PLAYER
          ==================================================
          Ini nampilin lagu favorit langsung dari Spotify pakai
          <iframe> resmi mereka (fitur "Embed" yang Spotify sediakan,
          bukan hosting file musik sendiri).

          CARA GANTI KE LAGU FAVORIT KAMU SENDIRI:
          1. Buka lagunya di app/situs Spotify
          2. Klik titik tiga (...) -> Share -> Copy embed code / Copy link lagu
          3. Dari link itu, ambil bagian ID-nya. Contoh:
             https://open.spotify.com/track/ISI_ID_LAGU_DI_SINI
          4. Ganti ID di URL "src" bawah ini (yang sekarang isinya
             lagu "love." dari wave to earth, sesuai daftar favoritmu
             di halaman Fun Facts) dengan ID lagu pilihanmu.
        -->
        <div class="spotify-widget tilt-card">
            <p class="spotify-widget-label">🎧 Now Playing</p>
            <iframe
                title="Spotify mini player - lagu favorit"
                src="https://open.spotify.com/embed/track/5mtTAScDytxMMqZj14NmlN?utm_source=generator&theme=0"
                width="100%"
                height="152"
                frameborder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy">
            </iframe>
        </div>

    </main>
    <footer class="main-footer">
        <p>&copy; 2026 ydsisnt. All rights reserved.</p>
    </footer>

    <!--
      TOMBOL WHATSAPP MENGAMBANG (QUICK CONTACT)
      ===========================================
      Ditaruh di luar <main>/<header>/<footer> supaya posisinya
      "fixed" murni ke layar (nggak kepengaruh layout elemen lain),
      dan tetap kelihatan di halaman mana pun user lagi scroll.

      GANTI NOMOR WHATSAPP-NYA:
      Format link wa.me HARUS pakai kode negara tanpa tanda "+" atau "0"
      di depan. Contoh nomor Indonesia 0812-3456-7890 -> jadi 6281234567890.
      Teks setelah "?text=" itu pesan otomatis yang udah keisi duluan
      pas orang buka chat-nya (opsional, boleh dihapus kalau nggak perlu).
    -->
    <a
        href="https://wa.me/6283140664585?text=Halo%20ydsisnt%2C%20aku%20lihat%20web%20kamu%21"
        target="_blank"
        rel="noopener"
        class="btn-whatsapp-float"
        aria-label="Chat lewat WhatsApp">💬</a>

    <script src="script.js"></script>
</body>
</html>
